server.port=8084
spring.application.name=crawler-medicamentos

spring.datasource.url=jdbc:postgresql://localhost:5432/crawlerdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Tempo limite para requisições HTTP do crawler (ms)
crawler.timeout-ms=10000
# User-Agent enviado nas requisições para evitar bloqueio por bot detection
crawler.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
